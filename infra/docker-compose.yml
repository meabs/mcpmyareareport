services:
  mcp:
    container_name: myareareport-mcp
    build:
      context: ..
      dockerfile: Dockerfile
    image: myareareport-mcp:latest
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      PORT: "3001"
      MCP_APP_UI_DOMAIN: ${MCP_APP_UI_DOMAIN:-https://mcp.myareareport.com}
      USAGE_STATS_FILE: /app/data/usage-stats.json
      USAGE_DASHBOARD_USER: ${USAGE_DASHBOARD_USER:-admin}
      USAGE_DASHBOARD_PASSWORD: ${USAGE_DASHBOARD_PASSWORD:-}
      HOST_PROC_PATH: /host/proc
      USAGE_DISK_PATH: /app/data
    volumes:
      - myareareport_usage_data:/app/data
      - /proc:/host/proc:ro
    expose:
      - "3001"

  caddy:
    container_name: myareareport-caddy
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - mcp
    environment:
      DOMAIN: ${DOMAIN:-mcp.myareareport.com}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - myareareport_caddy_data:/data
      - myareareport_caddy_config:/config

volumes:
  myareareport_caddy_data:
  myareareport_caddy_config:
  myareareport_usage_data:
